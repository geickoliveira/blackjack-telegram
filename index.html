<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="importmap">
	<script src='//whephiwums.com/sdk.js' data-zone='9108066' data-sdk='show_9108066'></script>
        {
            "imports": {
                "uuid": "https://jspm.dev/uuid"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Blackjack</h1>
            <div id="balance">Saldo: <span id="balance-value">100</span></div>
        </header>

        <main>
            <div id="dealer-hand" class="hand">
                <h2>Dealer</h2>
                <div id="dealer-cards" class="cards"></div>
                <div id="dealer-value">Valor: <span id="dealer-hand-value">0</span></div>
            </div>

            <div id="player-hand" class="hand">
                <h2>Jogador</h2>
                <div id="player-cards" class="cards"></div>
                <div id="player-value">Valor: <span id="player-hand-value">0</span></div>
            </div>

            <div id="game-message"></div>
        </main>

        <footer>
            <div id="bet-controls">
                <label for="bet-amount">Aposta:</label>
                <input type="number" id="bet-amount" value="10" min="10">
                <button id="bet-button">Apostar</button>
            </div>

            <div id="game-controls">
                <button id="hit-button" disabled>Pedir</button>
                <button id="stand-button" disabled>Parar</button>
                <button id="deal-button">Iniciar</button>
            </div>
        </footer>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
